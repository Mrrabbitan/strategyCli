# === 回测参数 ===
initial_cash: 1000000
start_date: "2020-01-01"
end_date: "2025-12-31"
benchmark: "000906.SH"   # 中证800（行业策略综合基准）
market: "A股"

# === 交易成本（ETF 专用） ===
commission: 0.0005       # 万 0.5（综合券商均价）
stamp_tax: 0             # ETF 卖出免印花税（不可设非 0）
slippage: 0.001          # 0.1%

# === 标的池（8 只 = 1 宽基对照 + 6 行业 + 1 防守） ===
symbols:
  - code: "510300.SH"
    name: "沪深300ETF"
    market: "A股"
    role: "wide_base"
    lot_size: 100
    commission: 0.0005
    stamp_tax: 0
    t_plus_1: true
    price_limit_pct: 10

  - code: "512170.SH"
    name: "医疗ETF"
    market: "A股"
