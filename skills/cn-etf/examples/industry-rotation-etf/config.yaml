# === 策略参数（轮动） ===
indicators:
  lookback_short: 20
  lookback_mid: 60
  lookback_long: 120
  w_short: 0.5
  w_mid: 0.3
  w_long: 0.2
  ma_period: 60
  hold_top_n: 3
  rebalance_freq: "monthly"      # monthly | weekly
  rebalance_threshold: 5         # 仓位差异 < 5% 不动
  position_scale: 0.95           # 留 5% 现金缓冲
  defensive_code: "510880.SH"    # 防守切换标的

# === 风控参数 ===
risk:
  max_position_pct: 35           # 单 ETF 仓位上限 %
  total_position_pct: 95         # 总仓位上限 %
  max_drawdown_pct: 18           # 最大回撤暂停 %
  drawdown_pause_days: 5         # 回撤暂停天数
  extreme_drop_pct: 7            # 极端单日跌幅 %
  extreme_pause_days: 3          # 极端跌幅暂停天数

# === 数据源 ===
data_source: "akshare"           # ftshare > akshare（fetch_data.py 自动回落）
data_cycle: "daily"
